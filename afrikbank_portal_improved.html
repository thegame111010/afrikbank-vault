<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfrikBank - Auth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    
    <div class="max-w-md w-full bg-slate-900 p-8 rounded-xl border border-slate-700">
        <h2 class="text-2xl font-bold mb-6 text-amber-500 text-center">System Access</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 bg-black rounded border border-slate-700">
        <input type="password" id="password" placeholder="Passcode" class="w-full p-3 mb-6 bg-black rounded border border-slate-700">
        <button id="login-btn" class="w-full py-3 bg-amber-600 hover:bg-amber-500 font-bold rounded">CONNECT TERMINAL</button>
        <p id="status-msg" class="mt-4 text-center text-xs text-slate-500"></p>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');
        const statusMsg = document.getElementById('status-msg');

        document.getElementById('login-btn').onclick = async () => {
            statusMsg.textContent = "Initiating handshake...";
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                statusMsg.textContent = "Access Granted. Loading Portal...";
                window.location.reload(); // Refresh to trigger auth state
            } catch (err) {
                console.error("Auth Error:", err);
                statusMsg.textContent = "FAILURE: " + err.message;
            }
        };
    </script>
</body>
</html>
