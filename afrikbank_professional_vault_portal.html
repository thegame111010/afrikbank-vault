<!DOCTYPE html>
<html lang="en" class="bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfrikBank - Custodial Vault Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .luxury-header { font-family: 'Cinzel', serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(251, 191, 36, 0.1); }
        .gold-glow { box-shadow: 0 0 30px rgba(217, 119, 6, 0.08); }
    </style>
</head>
<body class="text-slate-200">

    <div id="auth-layer" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-panel p-10 rounded-2xl gold-glow border border-slate-800">
            <h1 class="luxury-header text-3xl text-amber-500 font-bold mb-2 text-center tracking-widest uppercase">AfrikBank</h1>
            <p class="text-xs text-center text-slate-500 mb-8 uppercase tracking-[0.2em]">Secure Custodial Portal</p>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Institutional Email" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:border-amber-500 outline-none transition-all">
                <input type="password" id="password" placeholder="Certificate Passcode" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:border-amber-500 outline-none transition-all">
                <button id="auth-btn" class="w-full py-3 bg-amber-600 hover:bg-amber-500 text-slate-950 font-bold rounded-lg transition-all uppercase tracking-wider text-xs">Connect Terminal</button>
            </div>
        </div>
    </div>

    <div id="dashboard-layer" class="hidden min-h-screen">
        <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div>
                    <h1 class="luxury-header text-lg text-amber-500 uppercase tracking-widest">AfrikBank</h1>
                    <span class="text-[9px] text-slate-500 uppercase tracking-widest">Private Wealth Division</span>
                </div>
                <div class="flex items-center gap-6">
                    <div id="user-display" class="text-right"></div>
                    <button onclick="logout()" class="text-slate-400 hover:text-rose-400 transition-all text-xs font-bold uppercase underline">Exit</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-panel p-8 rounded-2xl border-l-4 border-amber-600">
                    <h2 class="text-sm text-amber-500 font-bold uppercase tracking-wider">Account Valuation</h2>
                    <div id="asset-grid" class="grid grid-cols-2 gap-6 mt-6">
                        <!-- Assets injected here -->
                    </div>
                </div>
            </div>

            <div id="admin-sidebar" class="hidden space-y-6">
                <div class="glass-panel p-6 rounded-2xl border border-rose-500/20">
                    <h3 class="text-rose-500 font-bold text-xs uppercase mb-4 flex items-center">
                        <i class="fa-solid fa-shield-halved mr-2"></i> Admin Oversight
                    </h3>
                    <button class="w-full bg-rose-900/30 hover:bg-rose-900/50 text-rose-400 py-2 rounded-lg text-xs font-bold transition-all">Audit Vault Logs</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Setup Supabase (Replace with your actual keys)
        const supabase = supabase.createClient('https://xmlizdiopgqpfbkhyeef.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbGl6ZGlvcGdxcGZia2h5ZWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTk5NjgsImV4cCI6MjA5NjM3NTk2OH0.LB1KHcRWuBzA_KpOTEsxG4yR2930d2Vsd7HQTFWjqH0');

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Security handshake failed: " + error.message);
                return;
            }

            // Authenticated - Proceed to Fetch
            loadDashboard(data.user);
        };

        async function loadDashboard(user) {
            document.getElementById('auth-layer').classList.add('hidden');
            document.getElementById('dashboard-layer').classList.remove('hidden');

            // Fetch Profile & Assets
            const { data: profile } = await supabase.from('profiles').select('*').eq('user_id', user.id).single();
            const { data: assets } = await supabase.from('assets').select('*').eq('user_id', user.id).single();

            // Populate Info
            document.getElementById('user-display').innerHTML = `
                <div class="text-xs font-bold text-slate-200">${profile.name}</div>
                <div class="text-[9px] text-amber-500 uppercase">${profile.role}</div>
            `;

            document.getElementById('asset-grid').innerHTML = `
                <div><div class="text-[10px] text-slate-500 uppercase">Liquid Assets</div><div class="text-2xl font-bold">$${assets.liquid_asset.toLocaleString()}</div></div>
                <div><div class="text-[10px] text-slate-500 uppercase">Solid Reserve</div><div class="text-2xl font-bold">$${assets.solid_asset.toLocaleString()}</div></div>
            `;

            if (profile.role === 'ADMIN') {
                document.getElementById('admin-sidebar').classList.remove('hidden');
            }
        }

        function logout() {
            supabase.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>
